<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foundation Storage Browser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="/ui/js/iceberg-parser.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'surface-layer': '#ffffff',
                        'surface-layer-2': '#f9fafb',
                        'line-5': '#e5e7eb',
                        'text-primary': '#111827',
                        'text-secondary': '#6b7280',
                        'primary': '#3b82f6',
                        'primary-hover': '#2563eb',
                    },
                }
            }
        }
    </script>
    <style>
        :root {
            --sidebar-width: 280px;
            --right-panel-width: 320px;
        }
        
        .layout-container {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr var(--right-panel-width);
            height: 100vh;
        }
        
        @media (max-width: 1280px) {
            .layout-container {
                grid-template-columns: var(--sidebar-width) 1fr;
            }
            .right-panel {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .layout-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: fixed;
                left: -100%;
                z-index: 50;
                width: var(--sidebar-width);
                transition: left 0.3s ease;
            }
            .sidebar.mobile-open {
                left: 0;
            }
        }
    </style>
</head>
<body class="bg-surface-layer-2" x-data="s3Browser()" x-init="init()">
    <div class="layout-container">
        <!-- Left Sidebar - Buckets -->
        <aside class="sidebar bg-surface-layer border-r border-line-5 flex flex-col h-full">
            <!-- Header -->
            <div class="p-4 border-b border-line-5">
                <div class="flex items-center gap-3">
                    <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
                    </svg>
                    <h1 class="text-lg font-semibold text-text-primary">Storage Browser</h1>
                </div>
                
                <!-- Mobile menu toggle -->
                <button @click="mobileMenuOpen = false" class="md:hidden absolute top-4 right-4 p-2 hover:bg-gray-100 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <!-- Buckets List -->
            <div class="flex-1 overflow-y-auto">
                <div class="p-4">
                    <h2 class="text-sm font-medium text-text-secondary mb-3">Buckets</h2>
                    <div class="space-y-1">
                        <template x-for="bucket in buckets" :key="bucket">
                            <button 
                                @click="selectBucket(bucket)"
                                :class="{'bg-primary bg-opacity-10 text-primary': selectedBucket === bucket}"
                                class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-100 transition-colors text-left"
                            >
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                          d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                                </svg>
                                <span class="truncate" x-text="bucket"></span>
                            </button>
                        </template>
                    </div>
                    
                    <!-- Loading/Empty State -->
                    <div x-show="bucketsLoading" class="text-center py-8">
                        <div class="inline-block animate-spin rounded-full h-6 w-6 border-b-2 border-primary"></div>
                    </div>
                    <div x-show="!bucketsLoading && buckets.length === 0" class="text-center py-8 text-text-secondary text-sm">
                        No buckets found
                    </div>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="p-4 border-t border-line-5">
                <button class="w-full px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-hover transition-colors">
                    Create New Bucket
                </button>
            </div>
        </aside>
        
        <!-- Main Content Area -->
        <main class="flex flex-col h-full overflow-hidden">
            <!-- Header Bar -->
            <header class="bg-surface-layer border-b border-line-5 px-6 py-4">
                <div class="flex items-center justify-between">
                    <!-- Mobile menu toggle -->
                    <button @click="mobileMenuOpen = true" class="md:hidden p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    
                    <!-- Breadcrumb -->
                    <nav class="flex-1">
                        <ol class="flex items-center space-x-2 text-sm">
                            <li>
                                <a href="#" @click="navigateTo('')" class="text-text-secondary hover:text-primary">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                                    </svg>
                                </a>
                            </li>
                            <template x-for="(part, index) in currentPath.split('/').filter(p => p)" :key="index">
                                <li class="flex items-center">
                                    <span class="mx-2 text-text-secondary">/</span>
                                    <a href="#" 
                                       @click="navigateTo(currentPath.split('/').slice(0, index + 1).join('/'))" 
                                       class="text-text-secondary hover:text-primary"
                                       x-text="part"></a>
                                </li>
                            </template>
                        </ol>
                    </nav>
                    
                    <!-- Actions -->
                    <div class="flex items-center gap-2">
                        <button class="p-2 hover:bg-gray-100 rounded-lg">
                            <svg class="w-5 h-5 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                            </svg>
                        </button>
                        <button class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-hover transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                            </svg>
                            Upload
                        </button>
                    </div>
                </div>
            </header>
            
            <!-- Content Area -->
            <div class="flex-1 overflow-auto p-6">
                <!-- Iceberg Table Indicator -->
                <div x-show="isIcebergTable" class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6 flex items-center gap-3">
                    <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10a2 2 0 002 2h12a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H6a2 2 0 00-2 2z"></path>
                    </svg>
                    <div class="flex-1">
                        <p class="font-medium text-blue-900">Iceberg Table</p>
                        <p class="text-sm text-blue-700">This directory contains Apache Iceberg table data and metadata</p>
                    </div>
                </div>
                
                <!-- Loading State -->
                <div x-show="loading" class="flex items-center justify-center h-64">
                    <div class="text-center">
                        <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary mb-4"></div>
                        <p class="text-text-secondary">Loading...</p>
                    </div>
                </div>
                
                <!-- Error State -->
                <div x-show="error" class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p class="font-semibold">Error</p>
                    <p x-text="error"></p>
                </div>
                
                <!-- Files Grid -->
                <div x-show="!loading && !error" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4">
                    <!-- Directories -->
                    <template x-for="dir in directories" :key="dir">
                        <button 
                            @click="navigateTo(currentPath ? currentPath + '/' + dir : dir)"
                            class="bg-surface-layer border border-line-5 rounded-lg p-4 hover:border-primary transition-colors text-left group"
                        >
                            <div class="flex items-center gap-3 mb-2">
                                <svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                          d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                                </svg>
                            </div>
                            <p class="font-medium text-text-primary truncate" x-text="dir"></p>
                            <p class="text-sm text-text-secondary">Folder</p>
                        </button>
                    </template>
                    
                    <!-- Files -->
                    <template x-for="file in files" :key="file.Key">
                        <button 
                            @click="selectFile(file)"
                            :class="{'border-primary': selectedFile?.Key === file.Key}"
                            class="bg-surface-layer border border-line-5 rounded-lg p-4 hover:border-primary transition-colors text-left group"
                        >
                            <div class="flex items-center gap-3 mb-2">
                                <svg class="w-10 h-10 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                          d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                </svg>
                            </div>
                            <p class="font-medium text-text-primary truncate" x-text="getFileName(file.Key)"></p>
                            <p class="text-sm text-text-secondary" x-text="formatSize(file.Size)"></p>
                        </button>
                    </template>
                </div>
                
                <!-- Empty State -->
                <div x-show="!loading && !error && directories.length === 0 && files.length === 0" 
                     class="flex flex-col items-center justify-center h-64 text-center">
                    <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                    <p class="text-text-secondary mb-4">No files in this location</p>
                    <button class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary-hover transition-colors">
                        Upload Files
                    </button>
                </div>
            </div>
        </main>
        
        <!-- Right Panel - User Profile & File Details -->
        <aside class="right-panel bg-surface-layer border-l border-line-5 flex flex-col h-full">
            <!-- User Profile Section -->
            <div class="p-4 border-b border-line-5">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-primary bg-opacity-10 rounded-full flex items-center justify-center">
                        <span class="text-primary font-medium" x-text="userInitials"></span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-text-primary truncate" x-text="userName"></p>
                        <p class="text-sm text-text-secondary truncate" x-text="userEmail"></p>
                    </div>
                    <button @click="logout()" class="p-2 hover:bg-gray-100 rounded-lg">
                        <svg class="w-5 h-5 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- File Details Section -->
            <div class="flex-1 overflow-y-auto p-4">
                <template x-if="selectedFile">
                    <div>
                        <h3 class="font-medium text-text-primary mb-4">File Details</h3>
                        
                        <!-- Iceberg Metadata Display -->
                        <div x-show="selectedFileMetadata" class="mb-4">
                            <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4">
                                <div class="flex items-center gap-2 text-blue-700 text-sm font-medium">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                                    </svg>
                                    Iceberg Table Metadata
                                </div>
                            </div>
                            <div x-html="selectedFileMetadata" class="text-sm"></div>
                        </div>
                        
                        <!-- File Preview -->
                        <div class="bg-surface-layer-2 rounded-lg p-4 mb-4">
                            <svg class="w-16 h-16 text-text-secondary mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                            </svg>
                            <p class="text-center font-medium text-text-primary truncate" x-text="getFileName(selectedFile.Key)"></p>
                        </div>
                        
                        <!-- File Info -->
                        <div class="space-y-3">
                            <div>
                                <p class="text-sm text-text-secondary">Size</p>
                                <p class="font-medium text-text-primary" x-text="formatSize(selectedFile.Size)"></p>
                            </div>
                            <div>
                                <p class="text-sm text-text-secondary">Modified</p>
                                <p class="font-medium text-text-primary" x-text="formatDate(selectedFile.LastModified)"></p>
                            </div>
                            <div>
                                <p class="text-sm text-text-secondary">Path</p>
                                <p class="font-medium text-text-primary text-sm break-all" x-text="selectedFile.Key"></p>
                            </div>
                        </div>
                        
                        <!-- Actions -->
                        <div class="mt-6 space-y-2">
                            <a :href="getDownloadUrl(selectedFile.Key)" 
                               class="block w-full px-4 py-2 bg-primary text-white text-center rounded-lg hover:bg-primary-hover transition-colors">
                                Download
                            </a>
                            <button class="w-full px-4 py-2 border border-line-5 text-text-primary rounded-lg hover:bg-gray-50 transition-colors">
                                Share
                            </button>
                            <button class="w-full px-4 py-2 border border-red-200 text-red-600 rounded-lg hover:bg-red-50 transition-colors">
                                Delete
                            </button>
                        </div>
                    </div>
                </template>
                
                <!-- No Selection State -->
                <div x-show="!selectedFile" class="text-center py-8">
                    <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-text-secondary">Select a file to view details</p>
                </div>
            </div>
        </aside>
    </div>
    
    <!-- Overlay for mobile -->
    <div x-show="mobileMenuOpen" 
         @click="mobileMenuOpen = false"
         x-transition:enter="transition-opacity ease-linear duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-linear duration-300"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden"></div>

    <script>
    function s3Browser() {
        return {
            // State
            buckets: [],
            bucketsLoading: true,
            selectedBucket: '',
            currentPath: '',
            directories: [],
            files: [],
            loading: false,
            error: null,
            selectedFile: null,
            selectedFileMetadata: null,
            mobileMenuOpen: false,
            icebergParser: null,
            isIcebergTable: false,
            
            // User info
            userName: 'User',
            userEmail: 'user@example.com',
            userInitials: 'U',

            init() {
                // Check authentication
                if (!this.isAuthenticated()) {
                    window.location.href = '/ui/login.html';
                    return;
                }

                // Initialize Iceberg parser
                this.icebergParser = new IcebergMetadataParser();

                // Load user info
                this.loadUserInfo();
                
                // Load buckets
                this.loadBuckets();
                
                // Get path from URL hash
                const hash = window.location.hash.substring(1);
                if (hash) {
                    const parts = hash.split('/');
                    if (parts.length > 0) {
                        this.selectedBucket = parts[0];
                        this.currentPath = parts.join('/');
                        this.loadContents();
                    }
                }
                
                // Listen for hash changes
                window.addEventListener('hashchange', () => {
                    const hash = window.location.hash.substring(1);
                    if (hash) {
                        const parts = hash.split('/');
                        if (parts.length > 0) {
                            this.selectedBucket = parts[0];
                            this.currentPath = parts.join('/');
                            this.loadContents();
                        }
                    }
                });
            },

            isAuthenticated() {
                return localStorage.getItem('s3_auth_token') || 
                       localStorage.getItem('auth_token') || 
                       this.checkAuth0();
            },

            checkAuth0() {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    const [name, value] = cookie.trim().split('=');
                    if (name === 'auth0-session' || name === 'appSession') {
                        return true;
                    }
                }
                return false;
            },

            loadUserInfo() {
                // Try to get user info from different sources
                const authToken = localStorage.getItem('auth_token');
                if (authToken) {
                    // Decode basic auth
                    try {
                        const decoded = atob(authToken);
                        const [email] = decoded.split(':');
                        this.userEmail = email;
                        this.userName = email.split('@')[0];
                        this.userInitials = this.userName.substring(0, 2).toUpperCase();
                    } catch (e) {}
                }
                
                // TODO: Get user info from Auth0 session if available
            },

            getAuthHeaders() {
                const s3Token = localStorage.getItem('s3_auth_token');
                if (s3Token) {
                    const creds = JSON.parse(atob(s3Token));
                    const date = new Date().toISOString().replace(/[:-]|\.\d{3}/g, '');
                    return {
                        'Authorization': `AWS4-HMAC-SHA256 Credential=${creds.accessKey}/${date.substring(0,8)}/us-east-1/s3/aws4_request, SignedHeaders=host;x-amz-date, Signature=dummy`,
                        'X-Amz-Date': date
                    };
                }
                
                const authToken = localStorage.getItem('auth_token');
                if (authToken) {
                    return {
                        'Authorization': `Basic ${authToken}`
                    };
                }
                
                return {};
            },

            async loadBuckets() {
                this.bucketsLoading = true;
                try {
                    const response = await fetch('/', {
                        headers: this.getAuthHeaders()
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const text = await response.text();
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, 'text/xml');
                    
                    this.buckets = [];
                    const bucketNodes = xml.querySelectorAll('Bucket > Name');
                    bucketNodes.forEach(node => {
                        this.buckets.push(node.textContent);
                    });
                } catch (err) {
                    console.error('Failed to load buckets:', err);
                } finally {
                    this.bucketsLoading = false;
                }
            },

            selectBucket(bucket) {
                this.selectedBucket = bucket;
                this.currentPath = bucket;
                window.location.hash = bucket;
            },

            async loadContents() {
                if (!this.selectedBucket) return;
                
                this.loading = true;
                this.error = null;
                this.selectedFile = null;
                
                try {
                    let url = '/' + this.currentPath;
                    if (!url.endsWith('/')) url += '/';
                    url += '?list-type=2&delimiter=/';
                    
                    const response = await fetch(url, {
                        headers: this.getAuthHeaders()
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const text = await response.text();
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, 'text/xml');
                    
                    // Parse directories
                    this.directories = [];
                    const prefixes = xml.querySelectorAll('CommonPrefixes > Prefix');
                    prefixes.forEach(prefix => {
                        const path = prefix.textContent;
                        const dir = path.substring(this.currentPath.length + 1).replace(/\/$/, '');
                        if (dir && !dir.includes('/')) {
                            this.directories.push(dir);
                        }
                    });
                    
                    // Check if this is an Iceberg table directory
                    this.isIcebergTable = this.icebergParser.isIcebergTablePath(this.currentPath);
                    if (this.isIcebergTable) {
                        const tableInfo = this.icebergParser.detectTableFromPath(this.currentPath);
                        if (tableInfo) {
                            console.log('Viewing Iceberg table:', tableInfo);
                        }
                    }
                    
                    // Parse files
                    this.files = [];
                    const contents = xml.querySelectorAll('Contents');
                    contents.forEach(content => {
                        const key = content.querySelector('Key').textContent;
                        if (!key.endsWith('/') && this.isInCurrentDirectory(key)) {
                            this.files.push({
                                Key: key,
                                Size: parseInt(content.querySelector('Size').textContent),
                                LastModified: content.querySelector('LastModified').textContent
                            });
                        }
                    });
                } catch (err) {
                    this.error = err.message;
                } finally {
                    this.loading = false;
                }
            },

            isInCurrentDirectory(key) {
                const relativePath = key.substring(this.currentPath.length + 1);
                return !relativePath.includes('/');
            },

            getFileName(key) {
                return key.split('/').pop();
            },

            formatSize(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },

            formatDate(dateString) {
                return new Date(dateString).toLocaleString();
            },

            navigateTo(path) {
                window.location.hash = path;
            },

            async selectFile(file) {
                this.selectedFile = file;
                this.selectedFileMetadata = null;
                
                // Check if this is an Iceberg metadata file
                if (this.icebergParser.isIcebergMetadata(file.Key)) {
                    // Fetch and parse the metadata
                    try {
                        const response = await fetch('/' + file.Key, {
                            headers: this.getAuthHeaders()
                        });
                        
                        if (response.ok) {
                            const metadata = await response.json();
                            const parsed = await this.icebergParser.parseMetadata(metadata);
                            if (parsed) {
                                this.selectedFileMetadata = this.icebergParser.createMetadataHTML(parsed);
                            }
                        }
                    } catch (error) {
                        console.error('Failed to load Iceberg metadata:', error);
                    }
                }
            },

            getDownloadUrl(key) {
                return '/' + key;
            },

            logout() {
                localStorage.removeItem('s3_auth_token');
                localStorage.removeItem('auth_token');
                
                if (this.checkAuth0()) {
                    window.location.href = '/api/auth/logout';
                } else {
                    window.location.href = '/ui/login.html';
                }
            }
        }
    }
    </script>
</body>
</html>
